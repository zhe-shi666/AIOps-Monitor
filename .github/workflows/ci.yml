name: CI

on:
  push:
    branches:
      - main
      - develop
      - "feature/**"
  pull_request:

jobs:
  backend-test:
    name: Backend Test (Maven)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-ops-monitor
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run Unit Tests
        run: ./mvnw -q test

  frontend-build:
    name: Frontend Build (Vite)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: aiops-vue
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: aiops-vue/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Build
        run: npm run build
