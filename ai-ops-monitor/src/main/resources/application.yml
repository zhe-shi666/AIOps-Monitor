server:
  port: 8080

spring:
  profiles:
    active: prod  # 默认本地模式，启动时可通过 --spring.profiles.active=prod 覆盖
  application:
    name: ai-ops-monitor-A

  # --- AI 配置 (共有) ---
  ai:
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      chat:
        options:
          model: ${OLLAMA_MODEL:qwen3:0.6b}
          temperature: 0.7

  # --- 基础架构配置 (共有) ---
  threads:
    virtual:
      enabled: true
  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS_ENABLE:true}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    # Existing databases already created before Flyway should treat V1 as the captured baseline.
    # Brand-new empty databases still execute V1 normally.
    baseline-version: 1
    out-of-order: false
    validate-on-migrate: true

# --- JWT 配置 ---
jwt:
  # 至少 32 字符的随机字符串，生产环境请替换为强随机值
  secret: ${JWT_SECRET:aiops-monitor-jwt-secret-key-2026-change-in-production}
  expiration: ${JWT_EXPIRATION_MS:86400000}  # 24小时（毫秒）

security:
  registration:
    enabled: ${REGISTRATION_ENABLED:true}
  password:
    min-length: ${PASSWORD_MIN_LENGTH:10}
    require-uppercase: ${PASSWORD_REQUIRE_UPPERCASE:true}
    require-lowercase: ${PASSWORD_REQUIRE_LOWERCASE:true}
    require-digit: ${PASSWORD_REQUIRE_DIGIT:true}
    require-special: ${PASSWORD_REQUIRE_SPECIAL:true}
  bootstrap-admin:
    enabled: ${BOOTSTRAP_ADMIN_ENABLED:false}
    username: ${BOOTSTRAP_ADMIN_USERNAME:}
    email: ${BOOTSTRAP_ADMIN_EMAIL:}
    password: ${BOOTSTRAP_ADMIN_PASSWORD:}
  password-reset:
    mail-enabled: ${PASSWORD_RESET_MAIL_ENABLED:false}
    frontend-reset-url: ${PASSWORD_RESET_FRONTEND_URL:http://localhost:5173/reset-password}
    token-ttl-minutes: ${PASSWORD_RESET_TOKEN_TTL_MINUTES:30}
    from: ${PASSWORD_RESET_MAIL_FROM:${MAIL_USERNAME:}}
  notification-mail:
    enabled: ${NOTIFICATION_MAIL_ENABLED:true}
    from: ${NOTIFICATION_MAIL_FROM:${MAIL_USERNAME:}}

# --- 监控与端点配置 (共有) ---
management:
  endpoints:
    web:
      exposure:
        include: "health,info,prometheus,metrics"
  endpoint:
    prometheus:
      enabled: true
    health:
      show-details: always
  prometheus:
    metrics:
      export:
        enabled: true
  metrics:
    tags:
      application: ai-ops-monitor

monitor:
  ai:
    generate-timeout-seconds: 35
  investigation:
    auto-open-from-incident: false
  target:
    offline-seconds: 90
  agent:
    latest-version: agent-lite-1.2.0-cross
  retention:
    metrics-days: 30
    logs-days: 14
    traces-days: 14
    resolved-incidents-days: 180
    closed-anomalies-days: 90
    audit-days: 365
    cron: "0 30 3 * * *"
  local:
    default-user-id: ${MONITOR_LOCAL_DEFAULT_USER_ID:}
    default-username: ${MONITOR_LOCAL_DEFAULT_USERNAME:}
    auto-create-target: true
    cache-seconds: 60
    target-name-prefix: Local
  threshold:
    cpu: 70
    memory: 90
    disk: 85
    net-rx: 10485760
    net-tx: 10485760
    process-count: 400
    consecutive-breach-count: 2
    silence-seconds: 180
  escalation:
    p1-intervals: 1,3,5,10
    p2-intervals: 5,15,30
    p3-intervals: 15,30,60
    scan-ms: 30000
