server:
  port: 8080

spring:
  profiles:
    active: prod  # 默认本地模式，启动时可通过 --spring.profiles.active=prod 覆盖
  application:
    name: ai-ops-monitor-A

  # --- AI 配置 (共有) ---
  ai:
    ollama:
      base-url: http://localhost:11434
      chat:
        options:
          model: qwen3:0.6b
          temperature: 0.7

  # --- 基础架构配置 (共有) ---
  threads:
    virtual:
      enabled: true
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update

# --- JWT 配置 ---
jwt:
  # 至少 32 字符的随机字符串，生产环境请替换为强随机值
  secret: aiops-monitor-jwt-secret-key-2026-change-in-production
  expiration: 86400000  # 24小时（毫秒）

# --- 监控与端点配置 (共有) ---
management:
  endpoints:
    web:
      exposure:
        include: "health,info,prometheus,metrics"
  endpoint:
    prometheus:
      enabled: true
    health:
      show-details: always
  prometheus:
    metrics:
      export:
        enabled: true
  metrics:
    tags:
      application: ai-ops-monitor

monitor:
  target:
    offline-seconds: 90
  threshold:
    cpu: 70
    memory: 90
