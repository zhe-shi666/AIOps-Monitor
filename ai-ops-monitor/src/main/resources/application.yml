server:
  port: 8080

spring:
  profiles:
    active: prod  # 默认本地模式，启动时可通过 --spring.profiles.active=prod 覆盖
  application:
    name: ai-ops-monitor-A

  # --- AI 配置 (共有) ---
  ai:
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      chat:
        options:
          model: ${OLLAMA_MODEL:qwen3:0.6b}
          temperature: 0.7

  # --- 基础架构配置 (共有) ---
  threads:
    virtual:
      enabled: true
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update

# --- JWT 配置 ---
jwt:
  # 至少 32 字符的随机字符串，生产环境请替换为强随机值
  secret: aiops-monitor-jwt-secret-key-2026-change-in-production
  expiration: 86400000  # 24小时（毫秒）

# --- 监控与端点配置 (共有) ---
management:
  endpoints:
    web:
      exposure:
        include: "health,info,prometheus,metrics"
  endpoint:
    prometheus:
      enabled: true
    health:
      show-details: always
  prometheus:
    metrics:
      export:
        enabled: true
  metrics:
    tags:
      application: ai-ops-monitor

monitor:
  target:
    offline-seconds: 90
  local:
    default-user-id: ${MONITOR_LOCAL_DEFAULT_USER_ID:}
    default-username: ${MONITOR_LOCAL_DEFAULT_USERNAME:}
    auto-create-target: true
    cache-seconds: 60
    target-name-prefix: Local
  threshold:
    cpu: 70
    memory: 90
    disk: 85
    net-rx: 10485760
    net-tx: 10485760
    process-count: 400
    consecutive-breach-count: 2
    silence-seconds: 180
  escalation:
    p1-intervals: 1,3,5,10
    p2-intervals: 5,15,30
    p3-intervals: 15,30,60
    scan-ms: 30000
